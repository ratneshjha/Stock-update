<div id="stock-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px;">
    </div>

<script>
    fetch('live_stocks.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('update-time').innerText = "Last Scan: " + data.last_updated;
            const container = document.getElementById('stock-container');
            data.stocks.forEach(stock => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${stock.symbol} <span class="score">${stock.score}</span></h3>
                        <p><strong>${stock.name}</strong></p>
                        <p>Price: $${stock.price} | Growth: ${stock.growth}</p>
                        <span class="badge">${stock.tag}</span>
                        <p class="reason">${stock.reason}</p>
                    </div>`;
            });
        });
</script>
