name: Scheduled Stock Update

on:
  schedule:
    - cron: '0 */2 * * *' # This triggers every 2 hours
  workflow_dispatch: # This adds a 'Run' button so you can test it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: pip install yfinance finnhub-python

      - name: Run Stock Updater
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python stock_updater.py

      - name: Save & Push Changes
        run: |
          git config --global user.name "Stock-Bot"
          git config --global user.email "bot@github.com"
          git add live_stocks.json
          git commit -m "Automated price update" || exit 0
          git push
